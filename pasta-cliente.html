          <div class="campo">
            <label>Pontos das telas</label>
            <div id="listaPontos" class="pontos-grid"></div>
          </div>
        </section>
        <aside class="box box-lateral">
          <div class="campo">
            <div class="pdf-box">
              <div class="box-mini-topo">
                <strong>Contrato do cliente</strong>
                <span id="contratoStatus">Carregando...</span>
              </div>
              <div id="contratoPreview" class="contrato-preview"></div>
              <button id="btnBaixarContrato" class="botao botao-salvar botao-cheio" type="button">
                Enviar contrato
              </button>
            </div>
          </div>
          <div class="campo">
            <div class="upload-box">
              <div class="box-mini-topo">
                <strong>Adicionar mídia</strong>
                <button id="btnFiltroAgendamento" class="botao-filtro" type="button" aria-expanded="false">
                  Filtro
                </button>
              </div>
              <div class="upload-acoes">
                <input type="file" id="arquivoInput" accept=".mp4,.jpg,.jpeg,.png,.webp,.txt">
                <div class="linha-dupla">
                  <div class="campo campo-compacto">
                    <label for="dataPostagem">Data de postagem</label>
                    <input type="date" id="dataPostagem">
                  </div>
                  <div class="campo campo-compacto">
                    <label for="vencimentoExibicao">Vencimento</label>
                    <input type="date" id="vencimentoExibicao">
                  </div>
                </div>
                <div id="agendaAvancada" class="agenda-modal" hidden>
                  <div class="agenda-card" role="dialog" aria-modal="true" aria-labelledby="tituloAgendaFiltro">
                    <div class="agenda-card-topo">
                      <strong id="tituloAgendaFiltro">Filtro de exibição</strong>
                      <button id="btnFecharFiltroAgendamento" class="agenda-fechar" type="button" aria-label="Fechar filtro">
                        ×
                      </button>
                    </div>
                  <div class="campo campo-compacto">
                    <label for="agendamentoTipo">Repetição</label>
                    <select id="agendamentoTipo">
                      <option value="sempre">Sempre dentro do período</option>
                      <option value="dias_semana">Dias da semana</option>
                      <option value="dia_mes">Dia do mês</option>
                    </select>
                  </div>
                  <div class="agenda-dias">
                    <label><input type="checkbox" name="agendamentoDias" value="1"> Segunda</label>
                    <label><input type="checkbox" name="agendamentoDias" value="2"> Terça</label>
                    <label><input type="checkbox" name="agendamentoDias" value="3"> Quarta</label>
                    <label><input type="checkbox" name="agendamentoDias" value="4"> Quinta</label>
                    <label><input type="checkbox" name="agendamentoDias" value="5"> Sexta</label>
                    <label><input type="checkbox" name="agendamentoDias" value="6"> Sábado</label>
                    <label><input type="checkbox" name="agendamentoDias" value="0"> Domingo</label>
                  </div>
                  <div class="linha-dupla">
                    <div class="campo campo-compacto">
                      <label for="agendamentoDiaMes">Dia do mês</label>
                      <input id="agendamentoDiaMes" type="number" min="1" max="31" placeholder="1">
                    </div>
                  </div>
                  <div class="linha-dupla">
                    <div class="campo campo-compacto">
                      <label for="agendamentoHoraInicio">Horário inicial</label>
                      <input id="agendamentoHoraInicio" type="time">
                    </div>
                    <div class="campo campo-compacto">
                      <label for="agendamentoHoraFim">Horário final</label>
                      <input id="agendamentoHoraFim" type="time">
                    </div>
                  </div>
                    <div class="agenda-acoes">
                      <button id="btnLimparFiltroAgendamento" class="botao botao-secundario" type="button">
                        Limpar filtro
                      </button>
                      <button id="btnAplicarFiltroAgendamento" class="botao botao-salvar" type="button">
                        Aplicar filtro
                      </button>
                    </div>
                  </div>
                </div>
                <button id="btnUploadCliente" class="botao botao-salvar botao-cheio" type="button">
                  Enviar
                </button>
                <div id="statusUpload" class="status-upload"></div>
              </div>
            </div>
          </div>
        </aside>
      </div>
      <div class="grid-historicos">
        <section class="box">
          <h2>Histórico de contrato</h2>
          <div id="historicoContratos" class="historico-lista">
            <div class="historico-vazio">Nenhum contrato gerado ainda.</div>
          </div>
        </section>
        <section class="box">
          <h2>Histórico de arquivo</h2>
          <div id="historicoArquivos" class="historico-lista">
            <div class="historico-vazio">Nenhum arquivo enviado ainda.</div>
          </div>
        </section>
      </div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="pasta-cliente.js?v=4"></script>
</body>
</html>
