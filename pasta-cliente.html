<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Duna Branding | Pasta do Cliente</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --bg-1: #062014;
      --bg-2: #03110b;
      --line: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --muted: rgba(226, 234, 255, 0.78);
      --primary: #2fac58;
      --primary-hover: #63c873;
      --danger: #dc2626;
      --danger-hover: #ef4444;
      --ice-panel: #fbfffc;
      --ice-bg: #f6faf7;
      --ice-line: #dcebdd;
      --green-text: #176c36;
      --card-text: #122018;
      --card-muted: #4a5f52;
    }
    
    body {
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top center, rgba(74, 222, 128, 0.18), transparent 34%),
        linear-gradient(180deg, #0b2f1a 0%, #061d11 58%, #03100a 100%);
      padding: 28px 18px 70px;
    }
    
    button,
    input,
    textarea {
      font: inherit;
    }
    
    button {
      cursor: pointer;
    }
    
    .topo-fixo.novo-topo {
      position: relative;
      display: grid;
      grid-template-columns: 190px minmax(0, 1fr) 190px;
      align-items: center;
      max-width: 1120px;
      min-height: 132px;
      margin: 0 auto 28px;
      padding: 24px 0 22px;
    }
    
    .topo-esquerda {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      min-width: 120px;
      min-height: 56px;
    }
    
    .topo-centro {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-width: 0;
    }
    
    .topo-centro h1 {
      font-size: clamp(1.7rem, 2.7vw, 2.45rem);
      line-height: 1;
      letter-spacing: 0.075em;
      white-space: nowrap;
      color: #ffffff;
      text-shadow: 0 12px 34px rgba(0, 0, 0, 0.35);
      margin-bottom: 2px;
    }
    
    .topo-centro p {
      margin-top: 2px;
      font-size: clamp(1.05rem, 1.65vw, 1.38rem);
      color: var(--muted);
      font-weight: 300;
      letter-spacing: 0.01em;
    }
