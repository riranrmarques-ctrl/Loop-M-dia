<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <title>Loop Player | Clientes</title>
  <link rel="stylesheet" href="central-cliente.css?v=8">
</head>

<body>
  <aside class="sidebar-app">
    <div class="sidebar-logo">
      <img src="logo.png" alt="Loop Player">
    </div>

    <div class="sidebar-label">Navegação</div>

    <nav class="sidebar-nav">
      <a href="/geral.html">
        <i data-lucide="layout-dashboard"></i>
        Geral
      </a>

      <a href="/pontos.html">
        <i data-lucide="monitor"></i>
        Pontos
      </a>

      <a href="/central-cliente.html" class="ativo">
        <i data-lucide="users"></i>
        Anunciantes
      </a>

      <a href="/empresa.html">
        <i data-lucide="building-2"></i>
        Empresas
      </a>

      <a href="/contratos.html">
        <i data-lucide="file-text"></i>
        Contratos
      </a>

      <a href="/biblioteca.html">
        <i data-lucide="folder-open"></i>
        Biblioteca
      </a>
    </nav>

    <div class="sidebar-spacer"></div>

    <div class="sidebar-ajuda">
      <div class="whatsapp-icon">
        <i data-lucide="message-circle"></i>
      </div>

      <strong>Precisa de ajuda?</strong>
      <p>Fale com o suporte pelo WhatsApp.</p>

      <a href="https://wa.me/5531000000000" target="_blank" rel="noopener">
        Abrir WhatsApp
        <i data-lucide="external-link"></i>
      </a>
    </div>

    <div class="sidebar-user">
      <div class="avatar-user">V</div>

      <div>
        <strong>Vitor</strong>
        <span>Administrador</span>
      </div>

      <i data-lucide="chevron-down"></i>
    </div>
  </aside>

  <main id="conteudoClientes">
    <header class="topo-fixo novo-topo">
      <div class="topo-centro">
        <h1>Central de Clientes</h1>
        <p>Gerencie seus clientes</p>
      </div>

      <div id="mensagem" class="status-topo">Carregando...</div>
    </header>

    <section class="painel-shell">
      <div class="barra-acoes">
        <div class="busca-area">
          <label for="buscaCliente">Buscar cliente</label>
          <input id="buscaCliente" type="search" placeholder="Nome, código, telefone, e-mail...">
        </div>

        <div class="filtros-clientes">
          <label for="filtroClientes">Organizar por</label>
          <select id="filtroClientes" aria-label="Organizar clientes">
            <option value="status">Status</option>
            <option value="nome">Nome</option>
            <option value="data">Data</option>
            <option value="personalizado">Personalizado</option>
          </select>
        </div>

        <div class="acoes-direita">
          <button id="botaoAtualizar" class="btn-secundario" type="button">Atualizar</button>
          <button id="botaoNovoCliente" class="btn-principal" type="button">+ Novo cliente</button>
        </div>
      </div>

      <div id="listaClientes" class="clientes-grid">
        <div class="vazio">Carregando clientes...</div>
      </div>

      <div class="assinatura-duna">
        Desenvolvido por <strong>Duna Branding</strong>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="central-cliente.js?v=8"></script>
</body>
</html>
